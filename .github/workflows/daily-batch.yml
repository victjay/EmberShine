name: Daily Batch Automation

# ── Required GitHub Secrets ───────────────────────────────────────────────────
# TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID
# NEXT_PUBLIC_SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY
# CLOUDFLARE_ACCOUNT_ID, R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY
# R2_BUCKET_NAME, R2_PUBLIC_URL
# GOOGLE_GENERATIVE_AI_API_KEY

on:
  schedule:
    # 03:17 KST (UTC+9) = 18:17 UTC
    # Offset from :00 to reduce GitHub Actions queue congestion
    - cron: '17 18 * * *'
  workflow_dispatch:
    inputs:
      job:
        description: 'Job to run (all / seo / suggestions / media / stats / reminder)'
        required: false
        default: 'all'

jobs:
  batch:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ── Job 1: SEO Check ──────────────────────────────────────────────────
      - name: Job 1 — SEO Check
        if: ${{ !inputs.job || inputs.job == 'all' || inputs.job == 'seo' }}
        continue-on-error: true
        run: node scripts/batch/seo-check.js
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      # ── Job 2: AI Suggestions ─────────────────────────────────────────────
      - name: Job 2 — AI Suggestions
        if: ${{ !inputs.job || inputs.job == 'all' || inputs.job == 'suggestions' }}
        continue-on-error: true
        run: node scripts/batch/ai-suggestions.js
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_GENERATIVE_AI_API_KEY: ${{ secrets.GOOGLE_GENERATIVE_AI_API_KEY }}

      # ── Job 3: Media Optimization ─────────────────────────────────────────
      - name: Job 3 — Media Optimization
        if: ${{ !inputs.job || inputs.job == 'all' || inputs.job == 'media' }}
        continue-on-error: true
        run: node scripts/batch/media-optimize.js
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}

      # ── Job 4: Statistics Collection ─────────────────────────────────────
      - name: Job 4 — Statistics Collection
        if: ${{ !inputs.job || inputs.job == 'all' || inputs.job == 'stats' }}
        continue-on-error: true
        run: node scripts/batch/stats-collect.js
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      # ── Job 5: Draft Reminder ────────────────────────────────────────────
      - name: Job 5 — Draft Reminder
        if: ${{ !inputs.job || inputs.job == 'all' || inputs.job == 'reminder' }}
        continue-on-error: true
        run: node scripts/batch/draft-reminder.js
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

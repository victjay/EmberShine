name: Weekly Backup

# ── Required GitHub Secrets ────────────────────────────────────────────────────
# TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID
# SUPABASE_DB_HOST     (e.g. db.lddoqrgolyyshazhiuib.supabase.co)
# SUPABASE_DB_PASSWORD
# CLOUDFLARE_ACCOUNT_ID, R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY, R2_BUCKET_NAME
# BACKUP_ENCRYPTION_KEY  (strong passphrase for AES-256 encryption of DB dump)
# Backups are stored in the same R2 bucket under:
#   backups/db/           — encrypted pg_dump files (keep 4)
#   backups/r2-manifest/  — object list JSON        (keep 4)

on:
  schedule:
    # 02:00 KST Sunday (17:00 UTC Saturday)
    - cron: '0 17 * * 6'
  workflow_dispatch:
    inputs:
      job:
        description: 'Job to run (all / db / r2)'
        required: false
        default: 'all'

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      TELEGRAM_BOT_TOKEN:          ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID:            ${{ secrets.TELEGRAM_CHAT_ID }}
      SUPABASE_DB_HOST:            ${{ secrets.SUPABASE_DB_HOST }}
      SUPABASE_DB_PASSWORD:        ${{ secrets.SUPABASE_DB_PASSWORD }}
      CLOUDFLARE_ACCOUNT_ID:       ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID:            ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY:        ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET_NAME:              ${{ secrets.R2_BUCKET_NAME }}
      BACKUP_ENCRYPTION_KEY:       ${{ secrets.BACKUP_ENCRYPTION_KEY }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-node@v4.4.0
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install PostgreSQL 17 client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17

      # ── Job 1: Supabase DB Backup ──────────────────────────────────────────
      - name: Job 1 — Supabase DB Backup
        if: ${{ !inputs.job || inputs.job == 'all' || inputs.job == 'db' }}
        continue-on-error: true
        run: node scripts/batch/backup-db.js

      # ── Job 2: R2 File List Backup ─────────────────────────────────────────
      - name: Job 2 — R2 File List Backup
        if: ${{ !inputs.job || inputs.job == 'all' || inputs.job == 'r2' }}
        continue-on-error: true
        run: node scripts/batch/backup-r2.js
